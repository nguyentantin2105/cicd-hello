replicaCount: 2

image:
  repository: ghcr.io/nguyentantin2105/cicd-hello
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: cicd-hello.local
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

probes:
  readiness:
    path: /
    initialDelaySeconds: 2
    periodSeconds: 5
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10